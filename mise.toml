[settings]
# Only show task output on failure (keeps `mise run all` quiet on success)
task_output = "interleave"

[tools]
node = "22"
go = "1.25"
"golangci-lint" = "latest"

# --- Top-level tasks ---

[tasks.all]
description = "Run check, test, and build"
depends = ["check", "test", "build"]

[tasks.check]
description = "Lint, typecheck, format-check, secrets scan, and validate plugin"
depends = ["frontend:check", "backend:check", "check:secrets", "check:plugin"]

[tasks.test]
description = "Run all tests"
depends = ["frontend:test", "backend:test"]

[tasks.build]
description = "Build frontend and backend"
depends = ["frontend:build", "backend:build"]

[tasks.ls]
description = "List all available tasks"
run = "mise tasks"

[tasks."check:secrets"]
description = "Scan for leaked secrets with gitleaks"
run = "gitleaks git --staged --verbose"

[tasks."check:plugin"]
description = "Validate plugin.json metadata"
run = "pnpm run validate"

# --- Frontend tasks ---

[tasks."frontend:check"]
description = "Typecheck, lint, and format-check frontend"
run = [
  "pnpm run typecheck",
  "pnpm run lint",
  'pnpm exec prettier --check "src/**/*.{ts,tsx}" "tests/**/*.ts"',
]

[tasks."frontend:test"]
description = "Run Jest unit tests"
run = "pnpm run test:ci"

[tasks."frontend:build"]
description = "Build frontend for production"
run = "pnpm run build"

[tasks."frontend:dev"]
description = "Start frontend in watch mode"
run = "pnpm run dev"

# --- Backend tasks ---

[tasks."backend:check"]
description = "Vet and lint Go code"
run = [
  "go vet ./pkg/...",
  "golangci-lint run ./...",
]

[tasks."backend:test"]
description = "Run Go tests with race detection and coverage threshold"
run = """
# Probe if covdata tool is executable (fails in sandboxed environments)
covdata_path=$(go tool -n covdata 2>/dev/null)
if [ -n "$covdata_path" ] && [ -x "$covdata_path" ]; then
  go test -race -coverprofile=coverage.out -count=1 ./pkg/...
  total=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
  echo "Go coverage: ${total}%"
  threshold=10
  if [ -n "$total" ] && [ "$(echo "$total < $threshold" | bc)" -eq 1 ]; then
    echo "ERROR: Go coverage ${total}% is below threshold ${threshold}%"
    exit 1
  fi
  rm -f coverage.out
else
  echo "Coverage unavailable (sandbox), running tests without it..."
  go test -race -count=1 ./pkg/...
fi
"""

[tasks."backend:build"]
description = "Build Go backend for all platforms"
run = """
if go run github.com/magefile/mage -v buildAll 2>/dev/null; then
  exit 0
fi
# Fallback: build for current platform only (mage unavailable in sandboxed environments)
echo "mage unavailable, building for current platform only..."
go build -o dist/gpx_apm_$(go env GOOS)_$(go env GOARCH) ./pkg
"""

# --- Local deployment tasks ---

[tasks.deploy]
description = "Build and (re)deploy to local Grafana"
depends = ["build"]
run = "docker compose restart grafana"

[tasks."deploy:up"]
description = "Start the full local stack (Grafana + Mimir + Tempo + Loki)"
run = "docker compose up -d"

[tasks."deploy:down"]
description = "Stop and remove the local stack"
run = "docker compose down"

[tasks."deploy:restart"]
description = "Restart Grafana container (pick up new dist/)"
run = "docker compose restart grafana"

[tasks."deploy:logs"]
description = "Tail Grafana container logs"
run = "docker compose logs -f grafana"

[tasks."deploy:status"]
description = "Show running containers and Grafana health"
run = [
  "docker compose ps",
  "curl -sf http://localhost:3000/api/health | python3 -m json.tool || echo 'Grafana not reachable'",
]

[tasks."deploy:demo"]
description = "Start stack with OTel Demo traffic generator"
run = "docker compose -f docker-compose.yaml -f docker-compose.demo.yaml up -d"

# --- Utility tasks ---

[tasks.dev]
description = "Start dev stack and frontend watch"
run = ["docker compose up -d", "pnpm run dev"]

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf dist/ coverage/"

[tasks.release]
description = "Cut a release: bump version, update changelog, commit + tag"
run = "bash scripts/release.sh {{arg(i=0, name='bump', default='patch')}}"

# --- E2E tasks ---

[tasks.e2e]
description = "Run Playwright e2e tests (requires local stack running)"
run = """
# Ensure Grafana is reachable
if ! curl -sf http://localhost:3000/api/health >/dev/null 2>&1; then
  echo "❌ Grafana not reachable at localhost:3000"
  echo "   Start the stack first: mise run deploy:up"
  exit 1
fi
pnpm run e2e
"""

[tasks."e2e:ui"]
description = "Run Playwright e2e tests with interactive UI"
run = """
if ! curl -sf http://localhost:3000/api/health >/dev/null 2>&1; then
  echo "❌ Grafana not reachable at localhost:3000"
  echo "   Start the stack first: mise run deploy:up"
  exit 1
fi
pnpm exec playwright test --ui
"""
