[tools]
node = "22"
go = "1.25"
"golangci-lint" = "latest"

# --- Top-level tasks ---

[tasks.all]
description = "Run check, test, and build"
depends = ["check", "test", "build"]

[tasks.check]
description = "Lint, typecheck, and format-check frontend and backend"
depends = ["frontend:check", "backend:check"]

[tasks.test]
description = "Run all tests"
depends = ["frontend:test", "backend:test"]

[tasks.build]
description = "Build frontend and backend"
depends = ["frontend:build", "backend:build"]

[tasks.ls]
description = "List all available tasks"
run = "mise tasks"

# --- Frontend tasks ---

[tasks."frontend:check"]
description = "Typecheck, lint, and format-check frontend"
run = [
  "pnpm run typecheck",
  "pnpm run lint",
  'pnpm exec prettier --check "src/**/*.{ts,tsx}" "tests/**/*.ts"',
]

[tasks."frontend:test"]
description = "Run Jest unit tests"
run = "pnpm run test:ci"

[tasks."frontend:build"]
description = "Build frontend for production"
run = "pnpm run build"

[tasks."frontend:dev"]
description = "Start frontend in watch mode"
run = "pnpm run dev"

# --- Backend tasks ---

[tasks."backend:check"]
description = "Vet and lint Go code"
run = [
  "go vet ./pkg/...",
  "golangci-lint run ./...",
]

[tasks."backend:test"]
description = "Run Go tests with race detection"
run = "go test -race -count=1 ./pkg/..."

[tasks."backend:build"]
description = "Build Go backend for all platforms"
run = "go run github.com/magefile/mage -v buildAll"

# --- Local deployment tasks ---

[tasks.deploy]
description = "Build and (re)deploy to local Grafana"
depends = ["build"]
run = "docker compose restart grafana"

[tasks."deploy:up"]
description = "Start the full local stack (Grafana + Mimir + Tempo + Loki)"
run = "docker compose up -d"

[tasks."deploy:down"]
description = "Stop and remove the local stack"
run = "docker compose down"

[tasks."deploy:restart"]
description = "Restart Grafana container (pick up new dist/)"
run = "docker compose restart grafana"

[tasks."deploy:logs"]
description = "Tail Grafana container logs"
run = "docker compose logs -f grafana"

[tasks."deploy:status"]
description = "Show running containers and Grafana health"
run = [
  "docker compose ps",
  "curl -sf http://localhost:3000/api/health | python3 -m json.tool || echo 'Grafana not reachable'",
]

[tasks."deploy:demo"]
description = "Start stack with OTel Demo traffic generator"
run = "docker compose -f docker-compose.yaml -f docker-compose.demo.yaml up -d"

# --- Utility tasks ---

[tasks.dev]
description = "Start dev stack and frontend watch"
run = ["docker compose up -d", "pnpm run dev"]

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf dist/ coverage/"
