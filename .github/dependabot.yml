version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 5
      exclude:
        - '@grafana/plugin-e2e'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore'
      include: 'scope'
    ignore:
      # Grafana 13 SDK — defer until we migrate from Grafana 12
      - dependency-name: '@grafana/data'
        versions: ['>=13.0.0']
      - dependency-name: '@grafana/i18n'
        versions: ['>=13.0.0']
      - dependency-name: '@grafana/runtime'
        versions: ['>=13.0.0']
      - dependency-name: '@grafana/schema'
        versions: ['>=13.0.0']
      - dependency-name: '@grafana/ui'
        versions: ['>=13.0.0']
      - dependency-name: '@grafana/scenes'
        versions: ['>=7.0.0']
      # React 19 — Grafana 13 runtime ships React 19
      - dependency-name: 'react'
        versions: ['>=19.0.0']
      - dependency-name: 'react-dom'
        versions: ['>=19.0.0']
      - dependency-name: '@types/react'
        versions: ['>=19.0.0']
      - dependency-name: '@types/react-dom'
        versions: ['>=19.0.0']
    groups:
      npm-all:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(ci)'
    groups:
      actions-all:
        patterns:
          - '*'

  - package-ecosystem: gomod
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      go-all:
        patterns:
          - '*'
