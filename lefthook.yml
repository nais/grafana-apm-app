output:
  - summary
  - failure
  - execution_out

pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks git --pre-commit --staged --verbose
    go-lint:
      glob: "*.go"
      run: golangci-lint run --new-from-rev=HEAD ./...
    ts-lint:
      glob: "*.{ts,tsx}"
      run: pnpm run lint --quiet
    ts-typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm run typecheck
    prettier:
      glob: "*.{ts,tsx}"
      run: pnpm exec prettier --check "src/**/*.{ts,tsx}" "tests/**/*.ts"
    go-test:
      glob: "*.go"
      run: go test -short -race ./pkg/...
    js-test:
      glob: "*.{ts,tsx}"
      run: pnpm run test:ci
    plugin-validate:
      glob: "*.json"
      run: pnpm run validate
