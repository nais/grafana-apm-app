# Nav Cloud plugin config — use alongside nav-cloud.yaml datasources.
# Configures the plugin to use nav-metrics for metrics with per-environment
# Tempo/Loki datasources.
# Environment keys must match k8s_cluster_name label values in OTel data.

apiVersion: 1

apps:
  - type: 'nais-apm-app'
    org_id: 1
    disabled: false
    jsonData:
      metricsDataSource:
        uid: nav-metrics
        type: prometheus
      tracesDataSource:
        uid: dev-gcp-tempo
        type: tempo
        byEnvironment:
          dev:
            uid: dev-gcp-tempo
            type: tempo
          dev-fss:
            uid: dev-gcp-tempo
            type: tempo
          prod:
            uid: prod-gcp-tempo
            type: tempo
          prod-fss:
            uid: prod-gcp-tempo
            type: tempo
      logsDataSource:
        uid: dev-gcp-loki
        type: loki
        byEnvironment:
          dev:
            uid: dev-gcp-loki
            type: loki
          dev-fss:
            uid: dev-gcp-loki
            type: loki
          prod:
            uid: prod-gcp-loki
            type: loki
          prod-fss:
            uid: prod-gcp-loki
            type: loki
